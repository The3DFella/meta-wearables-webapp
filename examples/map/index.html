<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="See your location and your squad of nearby teammates on a live map, built for Meta Ray-Ban Display Glasses.">
  <meta name="mrbd-web-app-capable" content="yes">
  <title>Squad Map</title>
  <link rel="stylesheet" href="vendor/maplibre-gl.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="map-screen" class="screen">
      <header class="header">
        <h1>Squad Map</h1>
        <span class="header-meta" id="gps-status">Locating…</span>
      </header>
      <div class="content map-content">
        <div class="map-wrapper">
          <div id="map" class="map-gl"></div>
          <canvas id="map-canvas" class="map-canvas hidden"></canvas>
          <div id="map-focus" class="map-focus focusable" tabindex="0" data-action="map-focus" aria-label="Map. Tap to pan."></div>
          <div class="map-crosshair" aria-hidden="true">+</div>
          <div class="map-attribution" id="map-attribution">© OpenStreetMap</div>
          <img class="brand-logo" src="Gavriel_logo.png" alt="Gavriel" aria-hidden="true">
        </div>
        <div class="coords-bar" id="coords-bar">—</div>
      </div>
    </div>

    <div id="error-screen" class="screen hidden">
      <header class="header">
        <h1>Squad Map</h1>
      </header>
      <div class="content">
        <div class="error-container">
          <div class="error-icon">📍</div>
          <div class="error-message" id="error-message">Location unavailable</div>
        </div>
        <button class="nav-item focusable primary refresh-btn" data-action="retry-location">Try Again</button>
      </div>
    </div>
  </div>
  <script src="vendor/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
